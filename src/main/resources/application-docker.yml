spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/killedb}
    username: ${SPRING_DATASOURCE_USERNAME:killeuser}
    password: ${SPRING_DATASOURCE_PASSWORD:killepass}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  h2:
    console:
      enabled: false

server:
  port: 8080

logging:
  level:
    com.kille: INFO
    org.springframework: INFO
    org.hibernate: WARN
