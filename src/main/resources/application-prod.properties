# Prod profile: Postgres connection constructed from environment variables
# Required environment variables: either DB_URL or (DB_HOST, DB_PORT, DB_NAME), and DB_USER, DB_PASSWORD

spring.datasource.url=${DB_URL:jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

