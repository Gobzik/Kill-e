spring:
  datasource:
    url: jdbc:h2:mem:audiobookdb
    username: sa
    password: password
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

  h2:
    console:
      enabled: true
      path: /h2-console

  profiles:
    active: dev

server:
  port: 8080

logging:
  level:
    com.yourapp: DEBUG
    com.audiobook: DEBUG
    org.springframework: WARN
    org.hibernate: WARN

app:
  book-service:
    max-books: 100
    forbidden-titles:
      - "Test Book"
      - "Sample Book"
      - "Demo Book"
      - "Example Book"
      - "Dummy Book"
    max-chapters-per-book: 50
    max-chapter-length: 10000

  logging:
    use-cases:
      enabled: true
      include-args: true
      include-result: true
    repositories:
      enabled: true
      include-args: false
      include-result: false
      slow-query-threshold-ms: 500
    controllers:
      enabled: true
      include-headers: false