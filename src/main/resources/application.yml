spring:
  datasource:
    url: jdbc:h2:mem:audiobookdb
    username: sa
    password: password
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 8080

logging:
  level:
    com.audiobook: DEBUG

app:
  book-service:
    max-books: 100
    forbidden-titles:
      - "Test Book"
      - "Sample Book"
      - "Demo Book"
      - "Example Book"
      - "Dummy Book"
    max-chapters-per-book: 50
    max-chapter-length: 10000