spring.application.name=Kill-e

server.port=8080

logging.level.com.kille=DEBUG
logging.level.com.audiobook=DEBUG
logging.level.org.springframework=WARN
logging.level.org.hibernate=WARN

app.book-service.max-books=100
app.book-service.forbidden-titles=Test Book,Sample Book,Demo Book,Example Book,Dummy Book
app.book-service.max-chapters-per-book=50
app.book-service.max-chapter-length=10000

app.logging.use-cases.enabled=true
app.logging.use-cases.include-args=true
app.logging.use-cases.include-result=true
app.logging.repositories.enabled=true
app.logging.repositories.include-args=false
app.logging.repositories.include-result=false
app.logging.repositories.slow-query-threshold-ms=500
app.logging.controllers.enabled=true
app.logging.controllers.include-headers=false

spring.profiles.active=dev

# Dev profile (in-memory H2)
%dev.spring.datasource.url=jdbc:h2:mem:audiobookdb
%dev.spring.datasource.username=admin
%dev.spring.datasource.password=password
%dev.spring.datasource.driver-class-name=org.h2.Driver
%dev.spring.jpa.hibernate.ddl-auto=update
%dev.spring.jpa.show-sql=true
%dev.spring.jpa.properties.hibernate.format_sql=true
%dev.spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
%dev.spring.h2.console.enabled=true
%dev.spring.h2.console.path=/h2-console

# Prod profile
%prod.spring.datasource.url=${DB_URL:jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}}
%prod.spring.datasource.username=${DB_USER}
%prod.spring.datasource.password=${DB_PASSWORD}
%prod.spring.datasource.driver-class-name=org.postgresql.Driver
%prod.spring.jpa.hibernate.ddl-auto=validate
%prod.spring.jpa.show-sql=false

# SpringDoc OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true
