spring.application.name=Kill-e
spring.profiles.default=dev

# Server
server.port=8080

# Multipart upload limits (for FB2/text/audio uploads)
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Logging levels
logging.level.com.kille=DEBUG
logging.level.com.audiobook=DEBUG
logging.level.org.springframework=WARN
logging.level.org.hibernate=WARN

# Application settings
app.book-service.max-books=100
app.book-service.forbidden-titles=Test Book,Sample Book,Demo Book,Example Book,Dummy Book
app.book-service.max-chapters-per-book=50
app.book-service.max-chapter-length=10000

app.logging.use-cases.enabled=true
app.logging.use-cases.include-args=true
app.logging.use-cases.include-result=true
app.logging.repositories.enabled=true
app.logging.repositories.include-args=false
app.logging.repositories.include-result=false
app.logging.repositories.slow-query-threshold-ms=500
app.logging.controllers.enabled=true
app.logging.controllers.include-headers=false

# SpringDoc OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true

spring.datasource.url=jdbc:postgresql://postgres:5432/${POSTGRES_DB}
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

yandex.cloud.storage.endpoint=https://storage.yandexcloud.net
yandex.cloud.storage.region=ru-central1
yandex.cloud.storage.access-key=${YANDEX_CLOUD_ACCESS_KEY:local-access-key}
yandex.cloud.storage.secret-key=${YANDEX_CLOUD_SECRET_KEY:local-secret-key}
yandex.cloud.storage.bucket=${YANDEX_CLOUD_BUCKET:local-bucket}
yandex.cloud.storage.chapters-prefix=${YANDEX_CLOUD_CHAPTERS_PREFIX:books}
yandex.cloud.storage.path-style-access-enabled=${YANDEX_CLOUD_PATH_STYLE_ACCESS_ENABLED:true}
yandex.cloud.storage.presigned-url-expiration-hours=1

yandex.cloud.speechkit.endpoint=${YANDEX_SPEECHKIT_ENDPOINT:https://stt.api.cloud.yandex.net/stt/v3/recognizeFileAsync}
yandex.cloud.speechkit.api-key=${YANDEX_SPEECHKIT_API_KEY:}
yandex.cloud.speechkit.language=${YANDEX_SPEECHKIT_LANGUAGE:ru-RU}
yandex.cloud.speechkit.model=${YANDEX_SPEECHKIT_MODEL:general}
yandex.cloud.speechkit.audio-container=${YANDEX_SPEECHKIT_AUDIO_CONTAINER:MP3}
yandex.cloud.speechkit.folder-id=${YANDEX_SPEECHKIT_FOLDER_ID:}

jwt.secret=${JWT_SECRET_KEY:mysecretkeymysecretkeymysecretkey12}
jwt.expiration=3600000

app.bootstrap.admin.email=${BOOTSTRAP_ADMIN_EMAIL:admin@kille.local}
app.bootstrap.admin.username=${BOOTSTRAP_ADMIN_USERNAME:admin}
app.bootstrap.admin.password=${BOOTSTRAP_ADMIN_PASSWORD:admin12345}

# Monitoring (Actuator + Prometheus)
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when_authorized
management.endpoint.prometheus.access=unrestricted
management.metrics.tags.application=${spring.application.name}
management.metrics.distribution.percentiles-histogram.http.server.requests=true