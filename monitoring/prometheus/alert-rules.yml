groups:
  - name: kille-app-alerts
    rules:
      - alert: KillEAppDown
        expr: up{job="kille-app"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Kill-e app is down"
          description: "Prometheus cannot scrape kille-app for more than 1 minute."

      - alert: KillEHighErrorRate
        expr: |
          (
            sum(rate(http_server_requests_seconds_count{job="kille-app",status=~"5.."}[5m]))
            /
            clamp_min(sum(rate(http_server_requests_seconds_count{job="kille-app"}[5m])), 0.001)
          ) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High 5xx error rate"
          description: "5xx ratio is above 5% for the last 5 minutes."

      - alert: KillEHighP95Latency
        expr: |
          histogram_quantile(
            0.95,
            sum(rate(http_server_requests_seconds_bucket{job="kille-app"}[5m])) by (le)
          ) > 1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High API latency (p95)"
          description: "HTTP p95 latency is above 1 second for 10 minutes."
