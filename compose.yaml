services:
  postgres:
    image: postgres:16-alpine
    container_name: kille-postgres
    environment:
      POSTGRES_DB: killedb
      POSTGRES_USER: killeuser
      POSTGRES_PASSWORD: killepass
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U killeuser -d killedb"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kille-network

volumes:
  postgres_data:

networks:
  kille-network:
    driver: bridge
