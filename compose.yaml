services:
  postgres:
    image: postgres:16-alpine
    container_name: kille-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "15432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kille-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kille-app
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-default}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SERVER_PORT: ${SERVER_PORT:-8080}
      YANDEX_CLOUD_ACCESS_KEY: ${YANDEX_CLOUD_ACCESS_KEY:-local-dev-access-key}
      YANDEX_CLOUD_SECRET_KEY: ${YANDEX_CLOUD_SECRET_KEY:-local-dev-secret-key}
      YANDEX_CLOUD_BUCKET: ${YANDEX_CLOUD_BUCKET:-local-dev-bucket}
      YANDEX_SPEECHKIT_API_KEY: ${YANDEX_SPEECHKIT_API_KEY:-local-dev-speechkit-api-key}
      YANDEX_CLOUD_CHAPTERS_PREFIX: ${YANDEX_CLOUD_CHAPTERS_PREFIX:-books}
      YANDEX_CLOUD_PATH_STYLE_ACCESS_ENABLED: ${YANDEX_CLOUD_PATH_STYLE_ACCESS_ENABLED:-true}
    ports:
      - "${APP_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - kille-network
    restart: unless-stopped

  admin-ui:
    image: nginx:alpine
    container_name: kille-admin-ui
    ports:
      - "80:80"
    volumes:
      - ./src/main/resources/static:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - kille-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  kille-network:
    driver: bridge